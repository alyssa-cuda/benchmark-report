<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Card — Retention</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 48px;
}

.card {
  width: 1200px;
  height: 628px;
  background: #191919;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 64px 72px 52px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* Subtle dot texture */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

/* Coral accent bar on left */
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 5px;
  background: #ef6646;
}

.card-top {
  position: relative;
  z-index: 1;
}

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #ef6646;
  margin-bottom: 36px;
}

.stat-row {
  display: flex;
  align-items: flex-end;
  gap: 32px;
  margin-bottom: 28px;
}

.stat {
  font-size: 120px;
  font-weight: 900;
  letter-spacing: -6px;
  line-height: 1;
  color: #ffffff;
}

.stat .unit {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -2px;
}

.stat-label {
  font-size: 18px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  line-height: 1.4;
  padding-bottom: 14px;
  max-width: 280px;
}

.hook {
  font-size: 22px;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
  line-height: 1.6;
  max-width: 780px;
}

.hook strong {
  color: #ffffff;
  font-weight: 700;
}

.card-bottom {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}

.report-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  text-align: right;
  line-height: 1.5;
}
</style>
</head>

<div class="card">
  <div class="card-top">
    <div class="eyebrow">Retention — 2025 Benchmark Data</div>
    <div class="stat-row">
      <div class="stat">17–28<span class="unit">%</span></div>
      <div class="stat-label">of workers don't return after their first shift</div>
    </div>
    <div class="hook">
      Between <strong>1 in 6 and 1 in 4 workers</strong> complete a first shift and never come back.<br>
      The second shift is the real retention signal.
    </div>
  </div>
  <div class="card-bottom">
    <div class="logo-wrap">
      <svg height="18" viewBox="0 0 632 153"><use href="#zeal-white"/></svg>
    </div>
    <div class="report-label">2025 State of<br>Workforce Platforms</div>
  </div>
</div>
